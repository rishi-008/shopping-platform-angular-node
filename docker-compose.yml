services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-osp_db}
      MYSQL_USER: ${DB_USER:-osp_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-osp_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-osp_db}
      DB_SSL_MODE: disable
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      SPACES_REGION: ${SPACES_REGION:-}
      SPACES_BUCKET: ${SPACES_BUCKET:-}
      SPACES_ENDPOINT: ${SPACES_ENDPOINT:-}
      SPACES_PUBLIC_BASE_URL: ${SPACES_PUBLIC_BASE_URL:-}
      SPACES_ACCESS_KEY_ID: ${SPACES_ACCESS_KEY_ID:-}
      SPACES_SECRET_ACCESS_KEY: ${SPACES_SECRET_ACCESS_KEY:-}
      SPACES_PRODUCTS_PREFIX: ${SPACES_PRODUCTS_PREFIX:-}
    ports:
      - "${API_PORT:-3001}:3001"

  php:
    build:
      context: ./php
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-osp_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-osp_db}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - ./:/var/www/html:ro
    ports:
      - "${PHP_PORT:-8081}:80"

  web:
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  db_data:
