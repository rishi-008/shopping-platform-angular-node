services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-osp_db}
      MYSQL_USER: ${DB_USER:-osp_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${API_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-osp_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-osp_db}
      DB_SSL_MODE: disable
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"

volumes:
  db_data:
